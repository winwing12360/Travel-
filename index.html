<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>旅遊記帳</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f0f4f8}
textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1e293b;color:#94a3b8;font-family:system-ui;font-size:15px">載入中…</div></div>
<script>
'use strict';
const{useState,useEffect,useRef}=React;
const h=React.createElement;

const CUR=[
  {code:"JPY",name:"日圓",flag:"🇯🇵",sym:"¥",key:"jpy"},
  {code:"CNY",name:"人民幣",flag:"🇨🇳",sym:"¥",key:"cny"},
  {code:"KRW",name:"韓元",flag:"🇰🇷",sym:"₩",key:"krw"},
  {code:"HKD",name:"港幣",flag:"🇭🇰",sym:"HK$",key:"hkd"},
  {code:"USD",name:"美元",flag:"🇺🇸",sym:"$",key:"usd"},
  {code:"EUR",name:"歐元",flag:"🇪🇺",sym:"€",key:"eur"},
];
const EMOJIS=["✈️","🇯🇵","🇰🇷","🇨🇳","🇭🇰","🇺🇸","🇫🇷","🇩🇪","🇮🇹","🇹🇭","🇸🇬","🏖️","🗺️","🎌","🌏","🏔️","🛳️","🎡","🏕️","🎢"];
const COLORS=["#0ea5e9","#f59e0b","#10b981","#f43f5e","#8b5cf6","#06b6d4","#ec4899","#14b8a6"];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtR=r=>r==null?"—":r<1?r.toFixed(4):r.toFixed(2);
const mc=(trip,name)=>COLORS[trip.members.indexOf(name)%COLORS.length]||"#94a3b8";
const fmtT=dt=>{if(!dt)return"";const d=new Date(dt);return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;};
const ci=code=>CUR.find(c=>c.code===code);

async function compress(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=1600,sc=Math.min(MAX/img.width,MAX/img.height,1);
      const w=Math.round(img.width*sc),hh=Math.round(img.height*sc);
      const cv=document.createElement("canvas");cv.width=w;cv.height=hh;
      cv.getContext("2d").drawImage(img,0,0,w,hh);
      cv.toBlob(blob=>{
        if(!blob){rej(new Error("壓縮失敗"));return;}
        const r=new FileReader();
        r.onload=()=>res(r.result.split(",")[1]);
        r.onerror=rej;r.readAsDataURL(blob);
      },"image/jpeg",0.82);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("圖片讀取失敗"));};
    img.src=url;
  });
}

/* ── App ── */
function App(){
  const[view,setView]=useState("home");
  const[trips,setTrips]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[loaded,setLoaded]=useState(false);
  const[showNew,setShowNew]=useState(false);
  const[rates,setRates]=useState({});
  const[rateDate,setRateDate]=useState("");
  const[apiKey,setApiKey]=useState("");
  const[showApi,setShowApi]=useState(false);

  useEffect(()=>{
    try{const s=localStorage.getItem("tl2");if(s)setTrips(JSON.parse(s)||[]);}catch{}
    setApiKey(localStorage.getItem("tl-key")||"");
    setLoaded(true);
    fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/twd.json")
      .then(r=>r.json()).then(d=>{
        const r={};CUR.forEach(c=>{if(d.twd[c.key])r[c.code]=1/d.twd[c.key];});
        setRates(r);setRateDate(d.date);
      }).catch(()=>{});
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    try{localStorage.setItem("tl2",JSON.stringify(trips));}catch{}
  },[trips,loaded]);

  const saveKey=k=>{setApiKey(k);localStorage.setItem("tl-key",k);};
  const upd=(id,fn)=>setTrips(p=>p.map(t=>t.id===id?fn(t):t));
  const active=trips.find(t=>t.id===activeId);

  if(!loaded)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#1e293b",color:"#94a3b8"}},"載入中…");

  if(view==="trip"&&active)return h(Trip,{
    trip:active,rates,rateDate,apiKey,
    onBack:()=>setView("home"),
    onUpd:fn=>upd(activeId,fn),
    onNeedKey:()=>setShowApi(true)
  });

  return h("div",null,
    h(Home,{trips,showNew,
      onNew:()=>setShowNew(true),onHide:()=>setShowNew(false),
      onOpen:id=>{setActiveId(id);setView("trip");},
      onDel:id=>setTrips(p=>p.filter(t=>t.id!==id)),
      onCreate:data=>{
        const t={id:uid(),created:new Date().toISOString().slice(0,10),items:[],cRates:{},...data};
        setTrips(p=>[t,...p]);setActiveId(t.id);setShowNew(false);setView("trip");
      },
      hasKey:!!apiKey,onKey:()=>setShowApi(true)
    }),
    showApi&&h(ApiSetup,{cur:apiKey,onSave:k=>{saveKey(k);setShowApi(false);},onClose:()=>setShowApi(false)})
  );
}

/* ── API Key Setup ── */
function ApiSetup({cur,onSave,onClose}){
  const[k,setK]=useState(cur);
  const o={position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:200,display:"flex",alignItems:"flex-end"};
  const b={width:"100%",background:"#fff",borderRadius:"20px 20px 0 0",padding:24,paddingBottom:40};
  return h("div",{style:o},
    h("div",{style:b},
      h("div",{style:{fontWeight:700,fontSize:17,color:"#1e293b",marginBottom:6}},"Anthropic API Key"),
      h("div",{style:{fontSize:12,color:"#64748b",lineHeight:1.7,marginBottom:16}},
        "前往 ",h("a",{href:"https://console.anthropic.com",target:"_blank",style:{color:"#0ea5e9"}},"console.anthropic.com")," 取得 Key，僅存本機。"),
      h("input",{type:"password",value:k,onChange:e=>setK(e.target.value),placeholder:"sk-ant-...",
        style:{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"12px 14px",fontSize:14,outline:"none",marginBottom:16,fontFamily:"monospace"}}),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{onClick:onClose,style:{flex:1,padding:"12px 0",border:"1.5px solid #e2e8f0",borderRadius:12,background:"#fff",color:"#64748b",fontWeight:600,fontSize:14,cursor:"pointer"}},"取消"),
        h("button",{onClick:()=>onSave(k.trim()),disabled:!k.trim(),
          style:{flex:2,padding:"12px 0",border:"none",borderRadius:12,background:k.trim()?"#1e293b":"#e2e8f0",color:k.trim()?"#fff":"#94a3b8",fontWeight:700,fontSize:14,cursor:"pointer"}},"儲存")
      )
    )
  );
}

/* ── Home ── */
function Home({trips,showNew,onNew,onHide,onOpen,onDel,onCreate,hasKey,onKey}){
  const[name,setName]=useState("");
  const[emoji,setEmoji]=useState("✈️");
  const[members,setMembers]=useState([""]);
  const[delId,setDelId]=useState(null);
  const tot=t=>t.items.reduce((s,i)=>s+(i.total||0),0);
  const create=()=>{
    if(!name.trim())return;
    const ms=members.filter(m=>m.trim()).map(m=>m.trim());
    onCreate({name:name.trim(),emoji,members:ms.length?ms:["我"]});
    setName("");setEmoji("✈️");setMembers([""]);
  };
  const S={hd:{background:"#1e293b",padding:"48px 20px 20px"},
    row:{display:"flex",justifyContent:"space-between",alignItems:"center"},
    label:{color:"#94a3b8",fontSize:11,letterSpacing:1,textTransform:"uppercase"},
    title:{color:"#f1f5f9",fontSize:24,fontWeight:800,marginTop:4}};

  return h("div",{style:{background:"#f0f4f8",minHeight:"100vh"}},
    h("div",{style:S.hd},
      h("div",{style:S.row},
        h("div",null,h("div",{style:S.label},"旅遊記帳"),h("div",{style:S.title},"我的行程")),
        h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
          h("button",{onClick:onKey,style:{background:"rgba(255,255,255,.1)",border:"none",borderRadius:10,padding:"8px 12px",color:hasKey?"#34d399":"#f59e0b",fontSize:13,cursor:"pointer",fontWeight:600}},hasKey?"🔑 Key 已設定":"🔑 設定 Key"),
          !showNew&&h("button",{onClick:onNew,style:{background:"#38bdf8",border:"none",borderRadius:12,padding:"10px 18px",color:"#0f172a",fontWeight:700,fontSize:15,cursor:"pointer"}},"+ 新行程")
        )
      )
    ),
    showNew&&h("div",{style:{margin:"16px 16px 0",background:"#fff",borderRadius:20,padding:18,boxShadow:"0 2px 8px rgba(0,0,0,.08)"}},
      h("div",{style:{fontWeight:700,color:"#1e293b",fontSize:16,marginBottom:14}},"建立新行程"),
      h("div",{style:{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:8}},"圖示"),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:14}},
        EMOJIS.map(e=>h("button",{key:e,onClick:()=>setEmoji(e),style:{fontSize:20,padding:"4px 5px",borderRadius:8,border:"2px solid",borderColor:emoji===e?"#38bdf8":"transparent",background:emoji===e?"#f0f9ff":"transparent",cursor:"pointer"}},e))
      ),
      h("div",{style:{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:6}},"行程名稱"),
      h("input",{autoFocus:true,value:name,onChange:e=>setName(e.target.value),placeholder:"例：9月名古屋行",
        style:{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"10px 14px",fontSize:15,outline:"none",marginBottom:14,color:"#1e293b"}}),
      h("div",{style:{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:8}},"成員"),
      members.map((m,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:8,marginBottom:8}},
        h("div",{style:{width:8,height:8,borderRadius:"50%",background:COLORS[i%COLORS.length],flexShrink:0}}),
        h("input",{value:m,onChange:e=>setMembers(p=>p.map((x,j)=>j===i?e.target.value:x)),
          placeholder:["爸爸","媽媽","小寶","阿嬤","朋友A"][i]||`成員${i+1}`,
          style:{flex:1,border:"1.5px solid #e2e8f0",borderRadius:10,padding:"8px 12px",fontSize:14,outline:"none",color:"#1e293b"}}),
        members.length>1&&h("button",{onClick:()=>setMembers(p=>p.filter((_,j)=>j!==i)),style:{background:"none",border:"none",color:"#94a3b8",fontSize:18,cursor:"pointer"}},"×")
      )),
      h("button",{onClick:()=>setMembers(p=>[...p,""]),style:{color:"#38bdf8",background:"none",border:"1.5px dashed #bae6fd",borderRadius:10,padding:"6px 14px",fontSize:13,cursor:"pointer",marginBottom:16,width:"100%"}},"+ 新增成員"),
      h("div",{style:{display:"flex",gap:10}},
        h("button",{onClick:onHide,style:{flex:1,padding:"12px 0",border:"1.5px solid #e2e8f0",borderRadius:12,background:"#fff",color:"#64748b",fontWeight:600,fontSize:14,cursor:"pointer"}},"取消"),
        h("button",{onClick:create,disabled:!name.trim(),style:{flex:2,padding:"12px 0",border:"none",borderRadius:12,background:name.trim()?"#1e293b":"#e2e8f0",color:name.trim()?"#fff":"#94a3b8",fontWeight:700,fontSize:14,cursor:"pointer"}},"建立行程")
      )
    ),
    h("div",{style:{padding:"16px 16px 40px"}},
      trips.length===0&&!showNew&&h("div",{style:{textAlign:"center",padding:"64px 0",color:"#94a3b8"}},
        h("div",{style:{fontSize:48,marginBottom:12}},"✈️"),
        h("div",{style:{fontSize:16,fontWeight:600,marginBottom:6}},"尚無行程"),
        h("div",{style:{fontSize:13}},"點右上角「+ 新行程」開始記帳")
      ),
      trips.map(trip=>h("div",{key:trip.id,style:{background:"#fff",borderRadius:18,marginBottom:12,boxShadow:"0 1px 4px rgba(0,0,0,.06)",overflow:"hidden"}},
        h("div",{onClick:()=>{setDelId(null);onOpen(trip.id);},style:{padding:"16px 18px",display:"flex",alignItems:"center",cursor:"pointer"}},
          h("div",{style:{fontSize:36,marginRight:14,lineHeight:1}},trip.emoji),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontWeight:700,color:"#1e293b",fontSize:16}},trip.name),
            h("div",{style:{color:"#94a3b8",fontSize:12,marginTop:3}},trip.members.join(" · ")+"　·　"+trip.items.length+" 筆"),
            h("div",{style:{color:"#cbd5e1",fontSize:11,marginTop:2}},trip.created)
          ),
          h("div",{style:{fontWeight:800,color:"#1e293b",fontSize:18}},"NT$"+Math.round(tot(trip)).toLocaleString())
        ),
        h("div",{style:{borderTop:"1px solid #f8fafc",padding:"8px 18px",display:"flex",justifyContent:"flex-end",gap:10}},
          delId===trip.id
            ?h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
                h("span",{style:{fontSize:12,color:"#64748b"}},"確定刪除？"),
                h("button",{onClick:()=>setDelId(null),style:{fontSize:12,color:"#64748b",background:"none",border:"1px solid #e2e8f0",borderRadius:8,padding:"4px 12px",cursor:"pointer"}},"取消"),
                h("button",{onClick:()=>{onDel(trip.id);setDelId(null);},style:{fontSize:12,color:"#fff",background:"#ef4444",border:"none",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontWeight:600}},"刪除")
              )
            :h("button",{onClick:e=>{e.stopPropagation();setDelId(trip.id);},style:{fontSize:12,color:"#fca5a5",background:"none",border:"none",cursor:"pointer"}},"刪除行程")
        )
      ))
    )
  );
}

/* ── Trip ── */
function Trip({trip,rates,rateDate,apiKey,onBack,onUpd,onNeedKey}){
  const[cur,setCur]=useState("JPY");
  const[amt,setAmt]=useState("");
  const[iName,setIName]=useState("");
  const[pay,setPay]=useState("cash");
  const[fee,setFee]=useState("1.5");
  const[by,setBy]=useState(trip.members[0]||"我");
  const[editR,setEditR]=useState(false);
  const[rIn,setRIn]=useState("");
  const[inv,setInv]=useState(false);
  const[scan,setScan]=useState(false);
  const[msg,setMsg]=useState("");
  const[showTxt,setShowTxt]=useState(false);
  const[txt,setTxt]=useState("");
  const[txLoading,setTxL]=useState(false);
  const[clr,setClr]=useState(false);
  const[eId,setEId]=useState(null);
  const[eName,setEN]=useState("");
  const[eAmt,setEA]=useState("");
  const fRef=useRef();const aRef=useRef();const rRef=useRef();

  const lr=rates[cur];
  const er=trip.cRates?.[cur]??lr;
  const isCust=trip.cRates?.[cur]!=null;
  const dr=er?(inv?1/er:er):null;
  const dl=lr?(inv?1/lr:lr):null;
  const cinfo=ci(cur);
  const pAmt=parseFloat(amt);const pFee=parseFloat(fee)||0;

  const setCR=r=>onUpd(t=>({...t,cRates:{...t.cRates,[cur]:r}}));
  const clrCR=()=>onUpd(t=>{const c={...t.cRates};delete c[cur];return{...t,cRates:c};});
  const openR=()=>{setRIn(dr!=null?fmtR(dr):"");setEditR(true);setTimeout(()=>rRef.current?.focus(),50);};
  const confR=()=>{const v=parseFloat(rIn);if(!isNaN(v)&&v>0)setCR(inv?1/v:v);setEditR(false);};
  const togDir=()=>{if(editR&&rIn){const v=parseFloat(rIn);if(!isNaN(v)&&v>0)setRIn(fmtR(1/v));}setInv(p=>!p);};

  const calc=(base,method)=>{const f=method==="card"?Math.round(base*pFee/100):0;return{fee:f,total:Math.round(base)+f};};
  const pBase=!isNaN(pAmt)&&pAmt>0&&er?Math.round(pAmt*er):null;
  const pFeeV=pBase!==null&&pay==="card"?Math.round(pBase*pFee/100):0;
  const pTot=pBase!==null?pBase+pFeeV:null;

  const add=()=>{
    if(!pAmt||pAmt<=0||!er)return;
    const base=pAmt*er;const{fee:f,total:tot}=calc(base,pay);
    onUpd(t=>({...t,items:[...t.items,{id:uid(),name:iName.trim()||"品項",amount:pAmt,currency:cur,twd:Math.round(base),payMethod:pay,fee:f,total:tot,paidBy:by,datetime:new Date().toISOString()}]}));
    setIName("");setAmt("");setTimeout(()=>aRef.current?.focus(),50);
  };
  const del=id=>onUpd(t=>({...t,items:t.items.filter(i=>i.id!==id)}));
  const startE=item=>{setEId(item.id);setEN(item.name);setEA(item.amount.toString());};
  const cancelE=()=>setEId(null);
  const saveE=item=>{
    const na=parseFloat(eAmt);if(isNaN(na)||na<=0){cancelE();return;}
    const ir=trip.cRates?.[item.currency]??rates[item.currency];if(!ir){cancelE();return;}
    const base=na*ir;const f=item.payMethod==="card"?Math.round(base*pFee/100):0;
    onUpd(t=>({...t,items:t.items.map(i=>i.id===item.id?{...i,name:eName.trim()||i.name,amount:na,twd:Math.round(base),fee:f,total:Math.round(base)+f}:i)}));
    setEId(null);
  };

  const callAPI=async(messages)=>{
    if(!apiKey){onNeedKey();throw new Error("請先設定 API Key");}
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages})
    });
    const body=await r.text();
    let d;try{d=JSON.parse(body);}catch{throw new Error("回應格式錯誤: "+body.slice(0,60));}
    if(d.error)throw new Error("API: "+d.error.message);
    return(d.content||[]).map(c=>c.text||"").join("");
  };

  const parseItems=async txt=>{
    const reply=await callAPI([{role:"user",content:`以下是收據文字，辨識所有品項名稱（翻譯成繁體中文）、金額與貨幣(JPY/CNY/KRW/USD/HKD/EUR)。只回覆JSON：{"currency":"KRW","items":[{"name":"品名","amount":1234}]}\n\n${txt}`}]);
    const m=reply.match(/\{[\s\S]*\}/);if(!m)throw new Error("格式解析失敗");
    const p=JSON.parse(m[0]);
    const dc=p.currency?.toUpperCase();
    const uc=CUR.find(c=>c.code===dc)?dc:cur;
    const ur=trip.cRates?.[uc]??rates[uc]??er;
    if(p.items?.length>0){
      if(CUR.find(c=>c.code===dc))setCur(dc);
      const ni=p.items.map(item=>{const base=ur?item.amount*ur:0;const{fee:f,total:tot}=calc(base,pay);return{id:uid(),name:item.name||"未知品項",amount:item.amount,currency:uc,twd:Math.round(base),payMethod:pay,fee:f,total:tot,paidBy:by,datetime:new Date().toISOString()};});
      onUpd(t=>({...t,items:[...t.items,...ni]}));return p.items.length;
    }return 0;
  };

  const doScan=async e=>{
    const file=e.target.files[0];if(!file)return;
    if(!apiKey){onNeedKey();e.target.value="";return;}
    setMsg("");setScan(true);
    try{
      setMsg("⏳ 壓縮圖片…");
      const b64=await compress(file);
      setMsg("⏳ AI 辨識收據…");
      const reply=await callAPI([
        {role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},
          {type:"text",text:"收據照片，辨識所有品項名稱（翻譯成繁體中文）、金額與貨幣(JPY/CNY/KRW/USD/HKD/EUR)。只回覆JSON：{\"currency\":\"KRW\",\"items\":[{\"name\":\"品名\",\"amount\":1234}]}"}
        ]}
      ]);
      const m=reply.match(/\{[\s\S]*\}/);if(!m)throw new Error("格式解析失敗");
      const p=JSON.parse(m[0]);
      const dc=p.currency?.toUpperCase();
      const uc=CUR.find(c=>c.code===dc)?dc:cur;
      const ur=trip.cRates?.[uc]??rates[uc]??er;
      if(p.items?.length>0){
        if(CUR.find(c=>c.code===dc))setCur(dc);
        const ni=p.items.map(item=>{const base=ur?item.amount*ur:0;const{fee:f,total:tot}=calc(base,pay);return{id:uid(),name:item.name||"未知品項",amount:item.amount,currency:uc,twd:Math.round(base),payMethod:pay,fee:f,total:tot,paidBy:by,datetime:new Date().toISOString()};});
        onUpd(t=>({...t,items:[...t.items,...ni]}));
        setMsg("✓ 辨識到 "+ni.length+" 筆品項");
      }else setMsg("未辨識到品項");
    }catch(err){setMsg("✗ "+err.message);}
    finally{setScan(false);e.target.value="";}
  };

  const doTxt=async()=>{
    if(!txt.trim())return;setTxL(true);
    try{const n=await parseItems(txt);if(n>0){setTxt("");setShowTxt(false);setMsg("✓ 辨識到 "+n+" 筆品項");}else setMsg("未辨識到品項");}
    catch(err){setMsg("✗ "+err.message);}finally{setTxL(false);}
  };
