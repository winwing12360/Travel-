const{useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

const SURL='https://czykkhaoqejzcoltncea.supabase.co';

async function dbLoad(code){
  const{data,error}=await sb.from('trips').select('data').eq('invite_code',code).single();
  if(error)throw error;
  return data?.data||null;
}
async function dbSave(code,data){
  const{error}=await sb.from('trips').upsert({invite_code:code,data,updated_at:new Date().toISOString()},{onConflict:'invite_code'});
  if(error)throw error;
}

const CUR=[
  {code:"JPY",name:"日圓",flag:"🇯🇵",sym:"¥",key:"jpy"},
  {code:"CNY",name:"人民幣",flag:"🇨🇳",sym:"¥",key:"cny"},
  {code:"KRW",name:"韓元",flag:"🇰🇷",sym:"₩",key:"krw"},
  {code:"HKD",name:"港幣",flag:"🇭🇰",sym:"HK$",key:"hkd"},
  {code:"USD",name:"美元",flag:"🇺🇸",sym:"$",key:"usd"},
  {code:"EUR",name:"歐元",flag:"🇪🇺",sym:"€",key:"eur"},
];
const EMOJIS=["✈️","🇯🇵","🇰🇷","🇨🇳","🇭🇰","🇺🇸","🇫🇷","🇩🇪","🇮🇹","🇹🇭","🇸🇬","🏖️","🗺️","🎌","🌏","🏔️","🛳️","🎡","🏕️","🎢"];
const COLORS=["#0ea5e9","#f59e0b","#10b981","#f43f5e","#8b5cf6","#06b6d4","#ec4899","#14b8a6"];
const CAT_COLORS=["#0ea5e9","#f59e0b","#10b981","#f43f5e","#8b5cf6","#06b6d4","#ec4899","#14b8a6","#64748b","#84cc16"];
const DEFAULT_CATS=["餐飲","大人購物","兒童用品","紀念品","交通","住宿","門票","其他"];

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const fmtR=r=>{
  if(r==null)return"—";
  if(r<0.001)return r.toFixed(6);
  if(r<0.1)return r.toFixed(5);
  if(r<1)return r.toFixed(4);
  if(r<10)return r.toFixed(3);
  return r.toFixed(2);
};
const mc=(trip,name)=>COLORS[trip.members.indexOf(name)%COLORS.length]||"#94a3b8";
const fmtT=dt=>{if(!dt)return"";const d=new Date(dt);return`${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`;};
const ciOf=code=>CUR.find(c=>c.code===code);
const catColor=(cats,name)=>CAT_COLORS[cats.indexOf(name)%CAT_COLORS.length]||"#64748b";
function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');}

/* ── Pie Chart ── */
function PieChart({name,memberColor,items,cats}){
  const mine=items.filter(i=>i.paidBy===name);
  if(!mine.length)return null;
  const catTotals={};
  mine.forEach(i=>{const c=i.category||"其他";catTotals[c]=(catTotals[c]||0)+i.total;});
  const total=Object.values(catTotals).reduce((s,v)=>s+v,0);
  const entries=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const SZ=130,cx=65,cy=65,R=56,RIN=34;
  let angle=-Math.PI/2;
  const slices=entries.map(([cat,amt])=>{
    const ratio=amt/total;
    const sa=angle,ea=angle+ratio*Math.PI*2-(entries.length>1?0.02:0);
    angle+=ratio*Math.PI*2;
    const col=catColor(cats,cat);
    if(entries.length===1)return{cat,amt,col,full:true};
    const cos=Math.cos,sin=Math.sin;
    const x1=cx+R*cos(sa),y1=cy+R*sin(sa);
    const x2=cx+R*cos(ea),y2=cy+R*sin(ea);
    const ix1=cx+RIN*cos(sa),iy1=cy+RIN*sin(sa);
    const ix2=cx+RIN*cos(ea),iy2=cy+RIN*sin(ea);
    const large=ea-sa>Math.PI?1:0;
    const d=`M${x1.toFixed(1)} ${y1.toFixed(1)} A${R} ${R} 0 ${large} 1 ${x2.toFixed(1)} ${y2.toFixed(1)} L${ix2.toFixed(1)} ${iy2.toFixed(1)} A${RIN} ${RIN} 0 ${large} 0 ${ix1.toFixed(1)} ${iy1.toFixed(1)}Z`;
    return{cat,amt,col,d};
  });
  const fmtAmt=v=>v>=10000?Math.round(v/1000)+"k":v.toLocaleString();
  return h("div",{style:{background:"#fff",borderRadius:16,padding:"14px 16px",marginTop:10,boxShadow:"0 1px 3px rgba(0,0,0,.05)"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
      h("div",{style:{width:10,height:10,borderRadius:"50%",background:memberColor,flexShrink:0}}),
      h("span",{style:{fontWeight:700,color:"#1e293b",fontSize:15}},name),
      h("span",{style:{color:"#64748b",fontSize:13,marginLeft:4}},"NT$"+total.toLocaleString())
    ),
    h("div",{style:{display:"flex",alignItems:"center",gap:14}},
      h("svg",{width:SZ,height:SZ,viewBox:`0 0 ${SZ} ${SZ}`,style:{flexShrink:0}},
        slices[0]?.full
          ?h("g",null,h("circle",{cx,cy,r:R,fill:slices[0].col}),h("circle",{cx,cy,r:RIN,fill:"#fff"}))
          :slices.map((s,i)=>h("path",{key:i,d:s.d,fill:s.col})),
        h("circle",{cx,cy,r:RIN,fill:"#fff"}),
        h("text",{x:cx,y:cy-5,textAnchor:"middle",fontSize:9,fill:"#94a3b8"},"合計"),
        h("text",{x:cx,y:cy+9,textAnchor:"middle",fontSize:12,fontWeight:"bold",fill:"#1e293b"},fmtAmt(total))
      ),
      h("div",{style:{flex:1,minWidth:0}},
        entries.map(([cat,amt])=>{
          const col=catColor(cats,cat);const pct=Math.round(amt/total*100);
          return h("div",{key:cat,style:{display:"flex",alignItems:"center",gap:6,marginBottom:7}},
            h("div",{style:{width:8,height:8,borderRadius:2,background:col,flexShrink:0}}),
            h("div",{style:{flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12,color:"#334155"}},cat),
            h("div",{style:{textAlign:"right",flexShrink:0}},
              h("span",{style:{fontSize:12,fontWeight:700,color:"#1e293b"}},"NT$"+amt.toLocaleString()),
              h("span",{style:{fontSize:10,color:"#94a3b8",marginLeft:4}},pct+"%")
            )
          );
        })
      )
    )
  );
}

/* ── Who Am I Panel ── */
function WhoAmIPanel({onConfirm}){
  const[name,setName]=useState("");
  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:200,display:"flex",alignItems:"flex-end"}},
    h("div",{style:{width:"100%",background:"#fff",borderRadius:"24px 24px 0 0",padding:28,paddingBottom:44}},
      h("div",{style:{fontWeight:800,fontSize:20,color:"#0f172a",marginBottom:6}},"你的名字是？"),
      h("div",{style:{fontSize:13,color:"#64748b",lineHeight:1.6,marginBottom:20}},"輸入後會加入此行程的成員，記帳時預設由你付款。"),
      h("input",{autoFocus:true,value:name,onChange:e=>setName(e.target.value),
        onKeyDown:e=>e.key==="Enter"&&name.trim()&&onConfirm(name.trim()),
        placeholder:"例：媽媽、小明、阿嬤…",
        style:{width:"100%",border:"2px solid #e2e8f0",borderRadius:14,padding:"14px 16px",fontSize:17,outline:"none",color:"#0f172a",marginBottom:16,boxSizing:"border-box"}}),
      h("button",{onClick:()=>name.trim()&&onConfirm(name.trim()),disabled:!name.trim(),
        style:{width:"100%",padding:"14px 0",border:"none",borderRadius:14,
          background:name.trim()?"#1a2744":"#e2e8f0",
          color:name.trim()?"#fff":"#94a3b8",fontWeight:700,fontSize:16,cursor:"pointer"}},
        "加入行程")
    )
  );
}

/* ── App ── */
function App(){
  const[view,setView]=useState("home");
  const[myTrips,setMyTrips]=useState([]);
  const[activeCode,setActiveCode]=useState(null);
  const[tripData,setTripData]=useState(null);
  const[liveRates,setLiveRates]=useState({});
  const[loading,setLoading]=useState(false);
  const[syncStatus,setSyncStatus]=useState("");
  const[whoAmI,setWhoAmI]=useState(null);
  const[pendingJoin,setPendingJoin]=useState(null); // {code, members, data} — pending identity selection
  const channelRef=useRef(null);
  const saveTimerRef=useRef(null);

  useEffect(()=>{
    try{const s=localStorage.getItem("tl-trips");if(s)setMyTrips(JSON.parse(s)||[]);}catch{}
    // Detect ?join=CODE in URL
    const params=new URLSearchParams(window.location.search);
    const joinParam=params.get("join");
    if(joinParam){
      window.history.replaceState({},"",window.location.pathname);
      setPendingJoin(joinParam.toUpperCase());
    }
    setLoaded(true);
    fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/twd.json")
      .then(r=>r.json()).then(d=>{
        const r={};CUR.forEach(c=>{if(d.twd[c.key])r[c.code]=1/d.twd[c.key];});
        setLiveRates(r);
      }).catch(()=>{
        fetch("https://open.er-api.com/v6/latest/TWD")
          .then(r=>r.json()).then(d=>{
            if(d.rates){const r={};CUR.forEach(c=>{if(d.rates[c.code])r[c.code]=1/d.rates[c.code];});setLiveRates(r);}
          }).catch(()=>{});
      });
  },[]);

  const saveMyTrips=trips=>{setMyTrips(trips);localStorage.setItem("tl-trips",JSON.stringify(trips));};

  // Auto-join from shared URL
  useEffect(()=>{
    if(loaded&&pendingJoin){setPendingJoin(null);joinTrip(pendingJoin);}
  },[loaded,pendingJoin]);

  const subscribeTrip=useCallback((code)=>{
    if(channelRef.current)sb.removeChannel(channelRef.current);
    const ch=sb.channel("trip:"+code)
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"trips",filter:`invite_code=eq.${code}`},
        payload=>{
          if(!payload.new?.data)return;
          const remote=payload.new.data;
          setTripData(prev=>{
            if(!prev)return remote;
            const localIds=new Set((prev.items||[]).map(i=>i.id));
            const remoteIds=new Set((remote.items||[]).map(i=>i.id));
            const hasNewItems=(remote.items||[]).some(i=>!localIds.has(i.id));
            const hasRemovedItems=(prev.items||[]).some(i=>!remoteIds.has(i.id));
            const membersChanged=JSON.stringify(remote.members)!==JSON.stringify(prev.members);
            const catsChanged=JSON.stringify(remote.categories)!==JSON.stringify(prev.categories);
            const cRatesChanged=JSON.stringify(remote.cRates)!==JSON.stringify(prev.cRates);
            if(!hasNewItems&&!hasRemovedItems&&!membersChanged&&!catsChanged&&!cRatesChanged)
              return prev; // pure echo — ignore
            // Merge: remote as base + keep any locally-added items not yet saved
            const pendingLocal=(prev.items||[]).filter(i=>!remoteIds.has(i.id)&&hasNewItems===false);
            return{...remote,items:[...(remote.items||[]),...pendingLocal]};
          });
        })
      .subscribe();
    channelRef.current=ch;
  },[]);

  const openTrip=async(code)=>{
    setLoading(true);
    try{
      const data=await dbLoad(code);
      if(!data)throw new Error("找不到行程，請確認邀請碼");
      const saved=localStorage.getItem("tl-who-"+code);
      if(!saved){
        setWhoAmI({code,data});
      }else{
        setTripData(data);setActiveCode(code);setView("trip");subscribeTrip(code);
      }
    }catch(e){alert(e.message);}
    finally{setLoading(false);}
  };

  const updateTrip=useCallback((fn)=>{
    setTripData(prev=>{
      const next=fn(prev);
      clearTimeout(saveTimerRef.current);
      setSyncStatus("saving");
      saveTimerRef.current=setTimeout(async()=>{
        try{
          // Read latest tripData via ref to avoid stale closure
          await dbSave(activeCode,next);
          setSyncStatus("saved");setTimeout(()=>setSyncStatus(""),2000);
        }catch{setSyncStatus("error");}
      },600);
      return next;
    });
  },[activeCode]);

  const createTrip=async(meta)=>{
    const code=genCode();
    const data={...meta,items:[],cRates:{},categories:[...DEFAULT_CATS],created:new Date().toISOString().slice(0,10)};
    setLoading(true);
    try{
      await dbSave(code,data);
      // Creator defaults to first member
      if((meta.members||[]).length>0)localStorage.setItem("tl-who-"+code,meta.members[0]);
      saveMyTrips([{code,...meta,created:data.created},...myTrips]);      setTripData(data);setActiveCode(code);setView("trip");subscribeTrip(code);
    }catch(e){alert("建立失敗: "+e.message);}
    finally{setLoading(false);}
  };

  const joinTrip=async(code)=>{
    const clean=code.trim().toUpperCase();
    if(myTrips.find(t=>t.code===clean)){openTrip(clean);return;}
    setLoading(true);
    try{
      const data=await dbLoad(clean);
      if(!data)throw new Error("找不到行程，請確認邀請碼");
      saveMyTrips([...myTrips,{code:clean,name:data.name,emoji:data.emoji,members:data.members,created:data.created,creator:data.creator,startDate:data.startDate,endDate:data.endDate}]);
      const saved=localStorage.getItem("tl-who-"+clean);
      if(!saved){
        setWhoAmI({code:clean,data});
      }else{
        setTripData(data);setActiveCode(clean);setView("trip");subscribeTrip(clean);
      }
    }catch(e){alert(e.message);}
    finally{setLoading(false);}
  };

  const leaveView=()=>{
    if(channelRef.current){sb.removeChannel(channelRef.current);channelRef.current=null;}
    clearTimeout(saveTimerRef.current);
    setView("home");setActiveCode(null);setTripData(null);setSyncStatus("");
  };

  if(view==="trip"&&tripData&&activeCode)return h(TripScreen,{
    trip:tripData,code:activeCode,rates:liveRates,syncStatus,
    onBack:leaveView,onUpdate:updateTrip
  });

  return h("div",null,
    h(HomeScreen,{trips:myTrips,loading,
      onOpen:openTrip,onJoin:joinTrip,onCreate:createTrip,
      onRemove:code=>saveMyTrips(myTrips.filter(t=>t.code!==code))
    }),
    whoAmI&&h(WhoAmIPanel,{
      onConfirm:async(name)=>{
        const{code,data}=whoAmI;
        localStorage.setItem("tl-who-"+code,name);
        // Add to members if not already there
        let updated=data;
        if(!(data.members||[]).includes(name)){
          updated={...data,members:[...(data.members||[]),name]};
          await dbSave(code,updated).catch(()=>{});
          saveMyTrips(myTrips.map(t=>t.code===code?{...t,members:updated.members}:t));
        }
        setTripData(updated);setActiveCode(code);setWhoAmI(null);setView("trip");subscribeTrip(code);
      }
    }),
    loading&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}},
      h("div",{style:{background:"#1e293b",color:"#94a3b8",padding:"20px 32px",borderRadius:16,fontSize:14}},"載入中…")
    )
  );
}

/* ── Home ── */
function HomeScreen({trips,loading,onOpen,onJoin,onCreate,onRemove}){
  const[showNew,setShowNew]=useState(false);
  const[showJoin,setShowJoin]=useState(false);
  const[joinCode,setJoinCode]=useState("");
  const[name,setName]=useState("");
  const[emoji,setEmoji]=useState("✈️");
  const[members,setMembers]=useState([""]);
  const[startDate,setStartDate]=useState("");
  const[endDate,setEndDate]=useState("");
  const[delCode,setDelCode]=useState(null);

  const create=()=>{
    if(!name.trim())return;
    const ms=members.filter(m=>m.trim()).map(m=>m.trim());
    onCreate({name:name.trim(),emoji,members:ms.length?ms:["我"],startDate,endDate,creator:ms[0]||"我"});
    setName("");setEmoji("✈️");setMembers([""]);setStartDate("");setEndDate("");setShowNew(false);
  };

  const fmtTripDate=(s,e)=>{
    if(!s&&!e)return null;
    const fmt=d=>d.replace(/-/g,'.');
    if(!e)return fmt(s);
    const sp=s.split('-'),ep=e.split('-');
    return `${fmt(s)} - ${ep[1]}.${ep[2]}`;
  };

  // World map grid style
  const mapBg={
    backgroundColor:"#1a2744",
    backgroundImage:"radial-gradient(circle at 1.5px 1.5px,rgba(148,163,184,0.18) 1.5px,transparent 0)",
    backgroundSize:"28px 28px",
  };

  return h("div",{style:{background:"#f1f5f9",minHeight:"100vh"}},
    /* Header with map background */
    h("div",{style:{...mapBg,padding:"52px 20px 24px",position:"relative",overflow:"hidden"}},
      /* Decorative arcs */
      h("div",{style:{position:"absolute",top:-80,right:-80,width:260,height:260,borderRadius:"50%",border:"1.5px solid rgba(56,189,248,0.15)",pointerEvents:"none"}}),
      h("div",{style:{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",border:"1.5px solid rgba(56,189,248,0.1)",pointerEvents:"none"}}),
      h("div",{style:{position:"absolute",bottom:-60,left:-60,width:200,height:200,borderRadius:"50%",border:"1px solid rgba(148,163,184,0.08)",pointerEvents:"none"}}),
      h("div",{style:{position:"relative",zIndex:1}},
        h("div",{style:{color:"#64748b",fontSize:11,letterSpacing:3,textTransform:"uppercase",marginBottom:8,fontWeight:600}},"旅遊記帳"),
        h("div",{style:{color:"#f8fafc",fontSize:30,fontWeight:900,marginBottom:24,letterSpacing:-1}},"我的行程"),
        h("div",{style:{display:"flex",gap:10}},
          h("button",{onClick:()=>{setShowNew(p=>!p);setShowJoin(false);},
            style:{flex:1,padding:"13px 0",border:"none",borderRadius:50,
              background:showNew?"#38bdf8":"rgba(255,255,255,.15)",
              color:showNew?"#0f172a":"#f1f5f9",fontWeight:700,fontSize:14,cursor:"pointer"}},
            "＋ 建立行程"),
          h("button",{onClick:()=>{setShowJoin(p=>!p);setShowNew(false);},
            style:{flex:1,padding:"13px 0",border:"none",borderRadius:50,
              background:showJoin?"#38bdf8":"rgba(255,255,255,.15)",
              color:showJoin?"#0f172a":"#f1f5f9",fontWeight:700,fontSize:14,cursor:"pointer"}},
            "🔗 邀請碼")
        )
      )
    ),

    /* Join panel */
    showJoin&&h("div",{style:{margin:"14px 16px 0",background:"#fff",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,.08)"}},
      h("div",{style:{fontWeight:700,color:"#1e293b",fontSize:16,marginBottom:12}},"輸入邀請碼加入行程"),
      h("input",{autoFocus:true,value:joinCode,onChange:e=>setJoinCode(e.target.value.toUpperCase()),
        placeholder:"例：AB12CD",maxLength:6,
        style:{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"14px",fontSize:26,fontWeight:800,outline:"none",letterSpacing:10,textAlign:"center",color:"#1e293b",marginBottom:12}}),
      h("button",{onClick:()=>{if(joinCode.length===6){onJoin(joinCode);setJoinCode("");setShowJoin(false);}},
        disabled:joinCode.length!==6,
        style:{width:"100%",padding:"13px 0",border:"none",borderRadius:12,background:joinCode.length===6?"#1e293b":"#e2e8f0",color:joinCode.length===6?"#fff":"#94a3b8",fontWeight:700,fontSize:15,cursor:"pointer"}},
        "加入行程")
    ),

    /* New trip panel */
    showNew&&h("div",{style:{margin:"14px 16px 0",background:"#fff",borderRadius:20,padding:18,boxShadow:"0 2px 12px rgba(0,0,0,.08)"}},
      h("div",{style:{fontWeight:700,color:"#1e293b",fontSize:16,marginBottom:14}},"建立新行程"),
      /* Emoji picker */
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:14}},
        EMOJIS.map(e=>h("button",{key:e,onClick:()=>setEmoji(e),style:{fontSize:20,padding:"4px 5px",borderRadius:8,border:"2px solid",borderColor:emoji===e?"#38bdf8":"transparent",background:emoji===e?"#f0f9ff":"transparent",cursor:"pointer"}},e))
      ),
      /* Name */
      h("input",{autoFocus:true,value:name,onChange:e=>setName(e.target.value),placeholder:"行程名稱（例：9月名古屋行）",
        style:{width:"100%",border:"1.5px solid #e2e8f0",borderRadius:12,padding:"10px 14px",fontSize:15,outline:"none",marginBottom:14,color:"#1e293b"}}),
      /* Dates */
      h("div",{style:{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:8}},"旅遊日期"),

/* ── Trip Screen ── */
function TripScreen({trip,code,rates,syncStatus,onBack,onUpdate}){
  const cats=trip.categories||DEFAULT_CATS;
  const myIdentity=localStorage.getItem("tl-who-"+code)||trip.members?.[0]||"我";
  const[cur,setCur]=useState("JPY");
  const[amt,setAmt]=useState("");
  const[iName,setIName]=useState("");
  const[cat,setCat]=useState(cats[0]||"餐飲");
  const[pay,setPay]=useState("cash");
  const[fee,setFee]=useState("1.5");
  const[by,setBy]=useState(myIdentity);

  const setByAndSave=m=>{setBy(m);localStorage.setItem("tl-who-"+code,m);};
  const[editR,setEditR]=useState(false);
  const[rIn,setRIn]=useState("");
  const[inv,setInv]=useState(false);
  const[clr,setClr]=useState(false);
  const[eId,setEId]=useState(null);
  const[eName,setEN]=useState("");
  const[eAmt,setEA]=useState("");
  const[eCat,setEC]=useState("");
  const[showCode,setShowCode]=useState(false);
  const[copied,setCopied]=useState(false);
  const[shared,setShared]=useState(false);
  const[showAddCat,setShowAddCat]=useState(false);
  const[newCat,setNewCat]=useState("");
  const[manageCats,setManageCats]=useState(false);
  const aRef=useRef();const rRef=useRef();

  const lr=rates[cur];
  const er=(trip.cRates||{})[cur]??lr;
  const isCust=(trip.cRates||{})[cur]!=null;
  const dr=er?(inv?1/er:er):null;
  const dl=lr?(inv?1/lr:lr):null;
  const cinfo=ciOf(cur);
  const pAmt=parseFloat(amt);const pFee=parseFloat(fee)||0;

  const setCR=r=>onUpdate(t=>({...t,cRates:{...(t.cRates||{}),[cur]:r}}));
  const clrCR=()=>onUpdate(t=>{const c={...(t.cRates||{})};delete c[cur];return{...t,cRates:c};});
  const openR=()=>{setRIn(dr!=null?fmtR(dr):"");setEditR(true);setTimeout(()=>rRef.current?.focus(),50);};
  const confR=()=>{const v=parseFloat(rIn);if(!isNaN(v)&&v>0)setCR(inv?1/v:v);setEditR(false);};
  const togDir=()=>{if(editR&&rIn){const v=parseFloat(rIn);if(!isNaN(v)&&v>0)setRIn(fmtR(1/v));}setInv(p=>!p);};

  const calc=(base,method)=>{const f=method==="card"?Math.round(base*pFee/100):0;return{fee:f,total:Math.round(base)+f};};
  const pBase=!isNaN(pAmt)&&pAmt>0&&er?Math.round(pAmt*er):null;
  const pFeeV=pBase!==null&&pay==="card"?Math.round(pBase*pFee/100):0;
  const pTot=pBase!==null?pBase+pFeeV:null;

  const addCat=()=>{
    const n=newCat.trim();if(!n)return;
    if(cats.includes(n)){setCat(n);setShowAddCat(false);setNewCat("");return;}
    onUpdate(t=>({...t,categories:[...(t.categories||DEFAULT_CATS),n]}));
    setCat(n);setShowAddCat(false);setNewCat("");
  };
  const removeCat=name=>{
    onUpdate(t=>({...t,
      categories:(t.categories||DEFAULT_CATS).filter(c=>c!==name),
      items:(t.items||[]).map(i=>i.category===name?{...i,category:"其他"}:i)
    }));
    if(cat===name)setCat(cats.filter(c=>c!==name)[0]||"其他");
  };

  const add=()=>{
    if(!pAmt||pAmt<=0||!er)return;
    const base=pAmt*er;const{fee:f,total:tot}=calc(base,pay);
    onUpdate(t=>({...t,items:[...(t.items||[]),{id:uid(),category:cat,name:iName.trim(),amount:pAmt,currency:cur,twd:Math.round(base),payMethod:pay,fee:f,total:tot,paidBy:by,datetime:new Date().toISOString()}]}));
    setIName("");setAmt("");setTimeout(()=>aRef.current?.focus(),50);
  };
  const del=id=>onUpdate(t=>({...t,items:(t.items||[]).filter(i=>i.id!==id)}));
  const startE=item=>{setEId(item.id);setEN(item.name);setEA(item.amount.toString());setEC(item.category||cats[0]);};
  const cancelE=()=>setEId(null);
  const saveE=item=>{
    const na=parseFloat(eAmt);if(isNaN(na)||na<=0){cancelE();return;}
    const ir=(trip.cRates||{})[item.currency]??rates[item.currency];if(!ir){cancelE();return;}
    const base=na*ir;const f=item.payMethod==="card"?Math.round(base*pFee/100):0;
    onUpdate(t=>({...t,items:(t.items||[]).map(i=>i.id===item.id?{...i,name:eName.trim(),amount:na,category:eCat,twd:Math.round(base),fee:f,total:Math.round(base)+f}:i)}));
    setEId(null);
  };

  const items=trip.items||[];
  const cashT=items.filter(i=>i.payMethod==="cash").reduce((s,i)=>s+i.total,0);
  const cardB=items.filter(i=>i.payMethod==="card").reduce((s,i)=>s+i.twd,0);
  const cardF=items.filter(i=>i.payMethod==="card").reduce((s,i)=>s+i.fee,0);
  const cardT=cardB+cardF;const grand=cashT+cardT;
  const hasCash=items.some(i=>i.payMethod==="cash");
  const hasCard=items.some(i=>i.payMethod==="card");
  const byMember=(trip.members||[]).reduce((a,m)=>{a[m]=items.filter(i=>i.paidBy===m).reduce((s,i)=>s+i.total,0);return a;},{});

  // Group items by category (maintain category order)
  const grouped={};
  cats.forEach(c=>{grouped[c]=[];});
  items.forEach(i=>{const c=i.category||"其他";if(!grouped[c])grouped[c]=[];grouped[c].push(i);});
  const usedCats=cats.filter(c=>grouped[c]?.length>0);
  const catTotal=c=>(grouped[c]||[]).reduce((s,i)=>s+i.total,0);

  const syncColor=syncStatus==="saving"?"#f59e0b":syncStatus==="saved"?"#34d399":"#ef4444";
  const btn=(label,onClick,style)=>h("button",{onClick,style:{border:"none",cursor:"pointer",...style}},label);

  return h("div",{style:{background:"#f0f4f8",minHeight:"100vh"}},
    /* Header */
    h("div",{style:{background:"#1e293b",padding:"20px 16px 0",position:"sticky",top:0,zIndex:10}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}},
        btn("‹ 返回",onBack,{background:"none",color:"#38bdf8",fontSize:15,padding:0,fontWeight:600}),
        h("div",{style:{display:"flex",alignItems:"center",gap:10}},
          syncStatus&&h("div",{style:{width:8,height:8,borderRadius:"50%",background:syncColor}}),
          items.length>0&&h("div",{style:{textAlign:"right"}},
            h("div",{style:{color:"#64748b",fontSize:11}},items.length+" 筆 · 合計"),
            h("div",{style:{color:"#34d399",fontSize:20,fontWeight:800}},"NT$"+grand.toLocaleString())
          )
        )
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div",{style:{color:"#f1f5f9",fontSize:18,fontWeight:700}},trip.emoji+" "+trip.name),
        btn(showCode?"收起":"🔗 邀請碼",()=>setShowCode(p=>!p),{background:"rgba(255,255,255,.1)",color:"#94a3b8",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:600})
      ),
      showCode&&h("div",{style:{marginBottom:12,background:"rgba(255,255,255,.06)",borderRadius:12,padding:"12px 16px"}},
        h("div",{style:{fontSize:11,color:"#94a3b8",marginBottom:8}},"傳給家人，輸入邀請碼即可加入："),
        h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:10}},
          h("div",{style:{fontSize:28,fontWeight:900,letterSpacing:6,color:"#38bdf8",flex:1}},code),
          btn(copied?"✓ 已複製":"複製碼",()=>{navigator.clipboard?.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);});},{background:"rgba(255,255,255,.15)",color:"#f1f5f9",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700})
        ),
        h("button",{
          onClick:()=>{
            const url=window.location.origin+window.location.pathname+"?join="+code;
            navigator.clipboard?.writeText(url).then(()=>{setShared(true);setTimeout(()=>setShared(false),2500);});
          },
          style:{width:"100%",padding:"11px 0",border:"none",borderRadius:10,
            background:shared?"#34d399":"#38bdf8",
            color:"#0f172a",fontWeight:700,fontSize:14,cursor:"pointer",
            transition:"background .3s"}
        },shared?"✓ 連結已複製！":"🔗 分享行程（複製連結）")
      ),
      h("div",{style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:14}},
        CUR.map(c=>btn(c.flag+" "+c.name,()=>setCur(c.code),{flexShrink:0,padding:"6px 14px",borderRadius:999,background:cur===c.code?"#38bdf8":"rgba(255,255,255,.08)",color:cur===c.code?"#0f172a":"#94a3b8",fontWeight:cur===c.code?700:500,fontSize:13}))
      )
    ),
    /* Rate strip */
    h("div",{style:{background:"#0f172a",padding:"8px 14px"}},
      editR
        ?h("div",{style:{display:"flex",alignItems:"center",gap:6,justifyContent:"center",flexWrap:"wrap"}},
            !inv?h("span",{style:{color:"#38bdf8",fontSize:13,fontWeight:600}},"1 "+cinfo?.sym+" ("+cur+") ＝ NT$"):h("span",{style:{color:"#38bdf8",fontSize:13,fontWeight:600}},"NT$1 ＝"),
            h("input",{ref:rRef,type:"number",inputMode:"decimal",value:rIn,onChange:e=>setRIn(e.target.value),onKeyDown:e=>e.key==="Enter"&&confR(),placeholder:lr?fmtR(inv?1/lr:lr):"",
              style:{width:80,background:"#1e293b",border:"1.5px solid #38bdf8",borderRadius:8,padding:"4px 8px",color:"#f1f5f9",fontSize:15,fontWeight:700,outline:"none",textAlign:"center"}}),
            inv&&h("span",{style:{color:"#38bdf8",fontSize:13,fontWeight:600}},cinfo?.sym+" ("+cur+")"),
            btn("⇄",togDir,{background:"rgba(255,255,255,.1)",borderRadius:6,padding:"4px 8px",color:"#94a3b8",fontSize:14}),
            btn("確定",confR,{background:"#38bdf8",color:"#0f172a",borderRadius:8,padding:"4px 12px",fontWeight:700,fontSize:13}),
            btn("×",()=>setEditR(false),{background:"transparent",color:"#64748b",fontSize:18,lineHeight:1,padding:"0 2px"})
          )
        :h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:6,flexWrap:"wrap"}},
            !inv?h("span",{style:{color:"#38bdf8",fontSize:13,fontWeight:600}},"1 "+cinfo?.sym+" ("+cur+")\u3000＝\u3000",h("span",{style:{color:"#f1f5f9"}},"NT$ "+fmtR(dr))):h("span",{style:{color:"#38bdf8",fontSize:13,fontWeight:600}},"NT$1\u3000＝\u3000",h("span",{style:{color:"#f1f5f9"}},fmtR(dr)+" "+cinfo?.sym+" ("+cur+")")),

    /* Input card */

      h("div",{style:{background:"#fff",borderRadius:20,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}},
